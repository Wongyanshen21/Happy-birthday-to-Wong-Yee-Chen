<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dad's Birthday Quest</title>
    <style>
        body { margin: 0; overflow: hidden; background: #4a7c44; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: white; pointer-events: none; z-index: 10; text-shadow: 2px 2px 4px black; }
        #controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 5px; z-index: 20; }
        .row { display: flex; gap: 40px; }
        .btn { width: 65px; height: 65px; border-radius: 50%; background: rgba(255,255,255,0.3); border: 2px solid white; color: white; font-size: 25px; display: flex; justify-content: center; align-items: center; user-select: none; }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 15px; border-radius: 15px; text-align: center; width: 80%; max-width: 350px; z-index: 100; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #modal img { width: 100%; border-radius: 10px; }
        #modal button { margin-top: 10px; padding: 10px 20px; background: #4a7c44; color: white; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 id="main-title">HAPPY BIRTHDAY DAD!</h1>
        <p id="instruction">Go inside the house to find your memories!</p>
    </div>

    <div id="controls">
        <div class="btn" id="up">▲</div>
        <div class="row">
            <div class="btn" id="left">◀</div>
            <div class="btn" id="right">▶</div>
        </div>
        <div class="btn" id="down">▼</div>
    </div>

    <div id="modal">
        <h2 id="m-title"></h2>
        <img id="m-img" src="">
        <p id="m-text">What a memory!</p>
        <button onclick="closeM()">Back to Search</button>
    </div>

    <canvas id="g"></canvas>

    <script>
        const canvas = document.getElementById('g');
        const ctx = canvas.getContext('2d');
        const modal = document.getElementById('modal');
        const mImg = document.getElementById('m-img');

        let w = window.innerWidth, h = window.innerHeight;
        canvas.width = w; canvas.height = h;

        // Game States: 'overworld' or 'indoor'
        let state = 'overworld';
        let x = 0, y = 0, paused = false;
        const keys = { u: false, d: false, l: false, r: false };

        // The Overworld House
        const mainHouse = { x: 0, y: -300, size: 150 };

        // Indoor Photos
        const photos = [];
        for(let i=1; i<=28; i++) {
            photos.push({
                idx: i,
                px: (Math.random() - 0.5) * 1500,
                py: (Math.random() - 0.5) * 1500,
                v: false
            });
        }

        function closeM() { modal.style.display = 'none'; paused = false; }

        const bind = (id, k) => {
            const el = document.getElementById(id);
            el.ontouchstart = (e) => { e.preventDefault(); keys[k] = true; };
            el.onmousedown = () => { keys[k] = true; };
        };
        bind('up','u'); bind('down','d'); bind('left','l'); bind('right','r');
        window.onmouseup = window.ontouchend = () => { keys.u = keys.d = keys.l = keys.r = false; };

        function draw() {
            // Background color changes based on location
            ctx.fillStyle = state === 'overworld' ? "#4a7c44" : "#f3e5ab"; // Green grass vs Wood floor
            ctx.fillRect(0, 0, w, h);

            if(!paused) {
                if(keys.u) y += 12; if(keys.d) y -= 12;
                if(keys.l) x += 12; if(keys.r) x -= 12;
            }

            if (state === 'overworld') {
                // DRAW THE MAIN HOUSE
                const hx = w/2 + mainHouse.x + x;
                const hy = h/2 + mainHouse.y + y;
                
                ctx.fillStyle = "#8b4513";
                ctx.fillRect(hx, hy, mainHouse.size, mainHouse.size);
                ctx.fillStyle = "#333"; // Roof
                ctx.beginPath();
                ctx.moveTo(hx-20, hy); ctx.lineTo(hx+75, hy-80); ctx.lineTo(hx+170, hy); ctx.fill();
                ctx.fillStyle = "yellow"; // Door
                ctx.fillRect(hx+60, hy+90, 30, 60);

                // Check Entrance
                if(Math.hypot(w/2 - (hx+75), h/2 - (hy+75)) < 80) {
                    state = 'indoor';
                    x = 0; y = 0; // Reset position inside
                    document.getElementById('instruction').innerText = "Found: 0 / 28 Photos";
                    document.getElementById('main-title').innerText = "INSIDE THE HOUSE";
                }
            } else {
                // DRAW THE INDOOR MEMORIES
                photos.forEach(p => {
                    const sx = w/2 + p.px + x;
                    const sy = h/2 + p.py + y;

                    ctx.fillStyle = p.v ? "#ccc" : "#ff006e";
                    ctx.fillRect(sx, sy, 40, 40);
                    ctx.fillStyle = "white";
                    ctx.font = "12px Arial";
                    ctx.fillText(p.idx, sx + 15, sy + 25);

                    const dist = Math.hypot(w/2 - (sx+20), h/2 - (sy+20));
                    if(dist < 35 && !p.v) {
                        p.v = true; paused = true;
                        document.getElementById('m-title').innerText = "Memory #" + p.idx;
                        mImg.src = encodeURI("ugly photo" + p.idx + ".jpg");
                        modal.style.display = 'block';
                        const count = photos.filter(item => item.v).length;
                        document.getElementById('instruction').innerText = "Found: " + count + " / 28 Photos";
                    }
                });
            }

            // DRAW DAD
            ctx.fillStyle = "#FFD700";
            ctx.beginPath();
            ctx.arc(w/2, h/2, 22, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();
            ctx.fillStyle = "black"; ctx.font = "bold 10px Arial"; ctx.textAlign = "center";
            ctx.fillText("DAD", w/2, h/2 + 5);

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
