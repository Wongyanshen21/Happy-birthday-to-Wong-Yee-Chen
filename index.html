<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dad's Birthday Quest</title>
    <style>
        body { margin: 0; overflow: hidden; background: #4a7c44; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: white; pointer-events: none; z-index: 10; text-shadow: 2px 2px 4px black; }
        #controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 5px; z-index: 20; }
        .row { display: flex; gap: 40px; }
        .btn { width: 65px; height: 65px; border-radius: 50%; background: rgba(255,255,255,0.3); border: 2px solid white; color: white; font-size: 25px; display: flex; justify-content: center; align-items: center; user-select: none; }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 15px; border-radius: 15px; text-align: center; width: 85%; max-width: 350px; z-index: 100; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #modal img, #modal video { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
        #modal button { margin-top: 15px; padding: 10px 20px; background: #4a7c44; color: white; border: none; border-radius: 5px; font-weight: bold; }
        #victory-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #1a1a1a, #4a0e0e); z-index: 200; color: gold; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 id="main-title">HAPPY BIRTHDAY DAD!</h1>
        <p id="instruction">Enter the house to start the quest!</p>
    </div>

    <div id="controls">
        <div class="btn" id="up">▲</div>
        <div class="row"><div class="btn" id="left">◀</div><div class="btn" id="right">▶</div></div>
        <div class="btn" id="down">▼</div>
    </div>

    <div id="modal">
        <h2 id="m-title"></h2>
        <div id="media-container">
            <img id="m-img" src="" style="cursor: pointer;">
            <video id="m-video" controls></video>
        </div>
        <p id="m-text" style="color: #333; font-weight: bold; margin-top: 10px;"></p>
        <button onclick="closeM()">Back to Search</button>
    </div>

    <div id="victory-screen">
        <h1 style="font-size: 60px;">🎂✨🎁</h1>
        <h1>MISSION COMPLETE!</h1>
        <h2 style="color: white;">Happy Birthday to the Best Dad!</h2>
        <p style="color: #ccc; padding: 20px; font-size: 18px;">You found all 28 memories. We love you so much!</p>
        <button onclick="location.reload()" style="padding: 12px 25px; background: gold; color: black; border: none; border-radius: 8px; font-weight: bold;">Play Again</button>
    </div>

    <canvas id="g"></canvas>

    <script>
        const canvas = document.getElementById('g');
        const ctx = canvas.getContext('2d');
        const modal = document.getElementById('modal');
        const mImg = document.getElementById('m-img');
        const mVid = document.getElementById('m-video');
        const mText = document.getElementById('m-text');

        let w = window.innerWidth, h = window.innerHeight;
        canvas.width = w; canvas.height = h;

        let state = 'overworld';
        let x = 0, y = 0, paused = false;
        let currentPhotoIdx = 0;
        const keys = { u: false, d: false, l: false, r: false };

        const photoData = [
            { msg: "You and Olivia have the same amount of laziness" }, // 1
            { msg: "Dream come true!!" },                               // 2
            { msg: "TUMIIII" },                                         // 3
            { msg: "quack quack you look like it" },                    // 4
            { msg: "Congrats on winnning the prize of doing nothing!!" },// 5
            { msg: "Atleast a single picture of you and a celebrity :P" },// 6
            { msg: "What are you looking at" },                         // 7
            { msg: "Princess Paul (Click for her true form!)" },        // 8
            { msg: "Truly a princess" },                                // 9
            { msg: "China would be proud of that eyesight" },           // 10
            { msg: "What are you looking at" },                         // 11
            { msg: "relaxing" },                                        // 12
            { msg: "Bulging eyes" },                                    // 13
            { msg: "Bulging eyes" },                                    // 14
            { msg: "Bulging eyes" },                                    // 15
            { msg: "Still bulging eyes" },                              // 16
            { msg: "wo dui ni ai ai ai bu wan" },                       // 17
            { msg: "tasty food happy dad" },                            // 18
            { msg: "very proud pose!" },                                // 19
            { msg: "before eating pose" },                              // 20
            { msg: "Happy birthday!" },                                 // 21
            { msg: "Blooming flower" },                                 // 22
            { msg: "SEB team" },                                        // 23
            { msg: "what a cute couple (you and mother)" },             // 24
            { msg: "got the anti-stupid medication but didnt work" },   // 25
            { msg: "Cool looking dinosaur!" },                          // 26
            { msg: "The two dads" },                                    // 27
            { msg: "Heheh tooth fairy... THE END!" }                    // 28
        ];

        const photos = photoData.map((data, i) => ({
            idx: i + 1,
            px: (Math.random() - 0.5) * 2000,
            py: (Math.random() - 0.5) * 2000,
            msg: data.msg,
            v: false
        }));

        mImg.onclick = () => {
            if(currentPhotoIdx === 8) mImg.src = "ugly photo8 2.jpg";
        };

        function closeM() { 
            modal.style.display = 'none'; mVid.pause(); paused = false; 
            if(photos.every(p => p.v)) document.getElementById('victory-screen').style.display = 'flex';
        }

        const bind = (id, k) => {
            const el = document.getElementById(id);
            el.ontouchstart = (e) => { e.preventDefault(); keys[k] = true; };
            el.onmousedown = () => { keys[k] = true; };
        };
        bind('up','u'); bind('down','d'); bind('left','l'); bind('right','r');
        window.onmouseup = window.ontouchend = () => { keys.u = keys.d = keys.l = keys.r = false; };

        function draw() {
            ctx.fillStyle = state === 'overworld' ? "#4a7c44" : "#2c3e50";
            ctx.fillRect(0, 0, w, h);

            if(!paused) {
                if(keys.u) y += 13; if(keys.d) y -= 13;
                if(keys.l) x += 13; if(keys.r) x -= 13;
            }

            if (state === 'overworld') {
                const hx = w/2 + x, hy = h/2 - 300 + y;
                ctx.fillStyle = "#8b4513"; ctx.fillRect(hx, hy, 150, 150);
                ctx.fillStyle = "#333"; ctx.beginPath(); ctx.moveTo(hx-20, hy); ctx.lineTo(hx+75, hy-80); ctx.lineTo(hx+170, hy); ctx.fill();
                ctx.fillStyle = "yellow"; ctx.fillRect(hx+60, hy+90, 30, 60);
                if(Math.hypot(w/2 - (hx+75), h/2 - (hy+75)) < 80) { state = 'indoor'; x = 0; y = 0; }
            } else {
                photos.forEach(p => {
                    const sx = w/2 + p.px + x, sy = h/2 + p.py + y;
                    ctx.fillStyle = p.v ? "#555" : (p.idx === 1 ? "#3498db" : "#e74c3c");
                    ctx.fillRect(sx, sy, 45, 45);
                    ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.fillText(p.idx === 1 ? "VIDEO" : p.idx, sx + 5, sy + 25);

                    if(Math.hypot(w/2 - (sx+22), h/2 - (sy+22)) < 40 && !p.v) {
                        p.v = true; paused = true; currentPhotoIdx = p.idx;
                        document.getElementById('m-title').innerText = p.idx === 1 ? "Special Video" : "Memory #" + p.idx;
                        mText.innerText = p.msg;
                        
                        if(p.idx === 1) {
                            mImg.style.display = "none"; mVid.style.display = "block";
                            mVid.src = "ugly photo1.mp4";
                        } else {
                            mVid.style.display = "none"; mImg.style.display = "block";
                            // FIX: Only House 9 uses the '8 2' file. Everyone else uses their own number.
                            mImg.src = (p.idx === 9) ? "ugly photo8 2.jpg" : "ugly photo" + p.idx + ".jpg";
                        }
                        modal.style.display = 'block';
                        document.getElementById('instruction').innerText = "Found: " + photos.filter(i=>i.v).length + " / 28";
                    }
                });
            }
            ctx.fillStyle = "#FFD700"; ctx.beginPath(); ctx.arc(w/2, h/2, 22, 0, 7); ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
