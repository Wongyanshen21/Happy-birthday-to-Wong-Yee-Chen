<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dad's Birthday Quest</title>
    <style>
        /* 1. SETUP & BACKGROUND */
        body {
            margin: 0;
            overflow: hidden;
            background: #4a7c44;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        /* 2. UI HEADER */
        #ui-top {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 10;
        }

        /* 3. MOBILE CONTROLS (D-PAD) */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 20;
        }

        .side-btns {
            display: flex;
            gap: 50px;
        }

        .ctrl-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 3px solid white;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

            .ctrl-btn:active {
                background: rgba(255, 255, 255, 0.5);
            }

        /* 4. MEMORY POPUP */
        #memory-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            text-align: center;
            width: 85%;
            max-width: 400px;
            z-index: 100;
        }

            #memory-modal h2 {
                margin-top: 0;
                color: #333;
            }

            #memory-modal button {
                margin-top: 20px;
                padding: 12px 25px;
                background: #4a7c44;
                color: white;
                border: none;
                border-radius: 8px;
                font-weight: bold;
                cursor: pointer;
            }
    </style>
</head>
<body>

    <div id="ui-top">
        <h1>DAD'S BIRTHDAY QUEST</h1>
        <p>Walk to a house to unlock a memory!</p>
    </div>

    <div id="controls">
        <div class="ctrl-btn" id="up">▲</div>
        <div class="side-btns">
            <div class="ctrl-btn" id="left">◀</div>
            <div class="ctrl-btn" id="right">▶</div>
        </div>
        <div class="ctrl-btn" id="down">▼</div>
    </div>

    <div id="memory-modal">
        <h2 id="modal-title">Memory Found!</h2>
        <p id="modal-text">Story goes here...</p>
        <button onclick="closeModal()">Back to the Map</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const modal = document.getElementById('memory-modal');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let worldX = 0;
        let worldY = 0;
        const speed = 7;
        let isPaused = false;
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        const houses = [
            { x: 400, y: 100, color: '#8b4513', label: "Childhood Home", memory: "Happy Birthday! This represents where it all began.", visited: false },
            { x: -300, y: 400, color: '#4682b4', label: "The Garage", memory: "The legendary workshop. Thanks for fixing everything, Dad!", visited: false },
            { x: 100, y: -500, color: '#e63946', label: "Favorite Vacation", memory: "Remember that trip? We need to go back soon!", visited: false }
        ];

        // --- FIX FOR THE "STICKY KEY" BUG ---
        const stopAllMovement = () => {
            keys.ArrowUp = false;
            keys.ArrowDown = false;
            keys.ArrowLeft = false;
            keys.ArrowRight = false;
        };

        // Listen for when the user releases their finger/mouse ANYWHERE
        window.addEventListener('mouseup', stopAllMovement);
        window.addEventListener('touchend', stopAllMovement);

        const setupBtn = (id, keyName) => {
            const btn = document.getElementById(id);

            // Start moving on press
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyName] = true; });
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); keys[keyName] = true; });

            // We don't need 'touchend' here anymore because the window-level listener catches it!
        };

        setupBtn('up', 'ArrowUp');
        setupBtn('down', 'ArrowDown');
        setupBtn('left', 'ArrowLeft');
        setupBtn('right', 'ArrowRight');

        function closeModal() {
            modal.style.display = 'none';
            isPaused = false;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!isPaused) {
                if (keys['ArrowUp']) worldY += speed;
                if (keys['ArrowDown']) worldY -= speed;
                if (keys['ArrowLeft']) worldX += speed;
                if (keys['ArrowRight']) worldX -= speed;
            }

            houses.forEach(house => {
                const drawX = canvas.width / 2 + house.x + worldX;
                const drawY = canvas.height / 2 + house.y + worldY;

                ctx.fillStyle = house.color;
                ctx.fillRect(drawX, drawY, 80, 80);

                ctx.fillStyle = "#333";
                ctx.beginPath();
                ctx.moveTo(drawX - 10, drawY);
                ctx.lineTo(drawX + 40, drawY - 40);
                ctx.lineTo(drawX + 90, drawY);
                ctx.fill();

                ctx.fillStyle = "white";
                ctx.font = "bold 14px Arial";
                ctx.textAlign = "center";
                ctx.fillText(house.label, drawX + 40, drawY - 50);

                const dist = Math.sqrt(Math.pow(canvas.width / 2 - (drawX + 40), 2) + Math.pow(canvas.height / 2 - (drawY + 40), 2));
                if (dist < 60 && !house.visited) {
                    isPaused = true;
                    house.visited = true;
                    document.getElementById('modal-title').innerText = house.label;
                    document.getElementById('modal-text').innerText = house.memory;
                    modal.style.display = 'block';
                    stopAllMovement();
                }
            });

            // Draw Player (Dad Icon)
            ctx.shadowBlur = 10;
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.fillStyle = "#FFD700";
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 25, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.lineWidth = 3;
            ctx.strokeStyle = "white";
            ctx.stroke();

            ctx.fillStyle = "black";
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.fillText("DAD", canvas.width / 2, canvas.height / 2 + 5);

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
