<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dad's Birthday Quest</title>
    <style>
        body { margin: 0; overflow: hidden; background: #4a7c44; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #version-tag { position: absolute; top: 5px; right: 10px; color: rgba(255,255,255,0.5); font-size: 10px; z-index: 100; pointer-events: none; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: white; pointer-events: none; z-index: 10; text-shadow: 2px 2px 4px black; }
        #controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 5px; z-index: 20; }
        .row { display: flex; gap: 40px; }
        .btn { width: 65px; height: 65px; border-radius: 50%; background: rgba(255,255,255,0.3); border: 2px solid white; color: white; font-size: 25px; display: flex; justify-content: center; align-items: center; user-select: none; }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 15px; border-radius: 15px; text-align: center; width: 85%; max-width: 350px; z-index: 100; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #modal img, #modal video { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
        #modal button { margin-top: 15px; padding: 10px 20px; background: #4a7c44; color: white; border: none; border-radius: 5px; font-weight: bold; }
        #victory-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #1a1a1a, #4a0e0e); z-index: 200; color: gold; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>

    <div id="version-tag">Build: v2.2</div>

    <div id="ui">
        <h1 id="main-title">HAPPY BIRTHDAY DAD!</h1>
        <p id="instruction">Enter the house to start the quest!</p>
    </div>

    <div id="controls">
        <div class="btn" id="up">▲</div>
        <div class="row"><div class="btn" id="left">◀</div><div class="btn" id="right">▶</div></div>
        <div class="btn" id="down">▼</div>
    </div>

    <div id="modal">
        <h2 id="m-title"></h2>
        <div id="media-container">
            <img id="m-img" src="" style="cursor: pointer;">
            <video id="m-video" controls></video>
        </div>
        <p id="m-text" style="color: #333; font-weight: bold; margin-top: 10px; font-size: 1.2em;"></p>
        <button onclick="closeM()">Back to Search</button>
    </div>

    <div id="victory-screen">
        <h1 style="font-size: 60px;">🎂✨🎁</h1>
        <h1>MISSION COMPLETE!</h1>
        <h2 style="color: white;">Happy Birthday to the Best Dad!</h2>
        <button onclick="location.reload()" style="padding: 12px 25px; background: gold; color: black; border: none; border-radius: 8px; font-weight: bold;">Play Again</button>
    </div>

    <canvas id="g"></canvas>

    <script>
        const canvas = document.getElementById('g');
        const ctx = canvas.getContext('2d');
        const modal = document.getElementById('modal');
        const mImg = document.getElementById('m-img');
        const mVid = document.getElementById('m-video');
        const mText = document.getElementById('m-text');

        // --- CHARACTER IMAGE SETUP ---
        const charImg = new Image();
        charImg.src = "character.jpg"; 

        let w = window.innerWidth, h = window.innerHeight;
        canvas.width = w; canvas.height = h;

        let state = 'overworld';
        let x = 0, y = 0, paused = false;
        let currentHouseId = 0;
        const keys = { u: false, d: false, l: false, r: false };

        const dadJokes = [
            "I'm afraid for the calendar. Its days are numbered.",
            "My wife said I should do lunges to stay in shape. That would be a big step forward.",
            "Why do fathers take an extra pair of socks when they go golfing? In case they get a hole in one!",
            "Singing in the shower is fun until you get soap in your mouth. Then it's a soap opera.",
            "I thought the dryer was shrinking my clothes. Turns out it was the refrigerator all along.",
            "What do you call a factory that makes okay products? A satisfactory.",
            "Dear Math, grow up and solve your own problems.",
            "I'm on a seafood diet. I see food and I eat it.",
            "How do you make a tissue dance? You put a little boogie in it.",
            "Why did the bullet end up losing his job? He got fired.",
            "I used to be a baker, but I couldn't make enough dough.",
            "What did the ocean say to the beach? Nothing, it just waved.",
            "I tell dad jokes but I have no kids. I'm a faux pa.",
            "Did you hear about the guy who invented the Lifesaver? They say he made a mint.",
            "I'm reading a book on anti-gravity. It's impossible to put down!",
            "What's the best thing about Switzerland? I don't know, but the flag is a big plus.",
            "I'm so good at sleeping that I can do it with my eyes closed.",
            "A skeleton walks into a bar and orders a beer and a mop."
        ];

        const photoMessages = [
            "You and Olivia have the same amount of laziness", 
            "Dream come true!!", "TUMIIII", "quack quack you look like it",  
            "Congrats on winnning the prize of doing nothing!!",  
            "Atleast a single picture of you and a celebrity :P",  
            "What are you looking at",  
            "Princess Paul (Click for her true form!)", 
            "Truly a princess", 
            "China would be proud of that eyesight", 
            "What are you looking at", 
            "relaxing", 
            "Bulging eyes", 
            "Bulging eyes", 
            "Still bulging eyes", 
            "wo dui ni ai ai ai bu wan", 
            "tasty food happy dad", 
            "very proud pose!", 
            "before eating pose", 
            "Happy birthday!", 
            "Blooming flower", 
            "SEB team", 
            "what a cute couple (you and mother)", 
            "got the anti-stupid medication but didnt work", 
            "Cool looking dinosaur!", 
            "The two dads", 
            "Heheh tooth fairy", 
            "Santa's elf!" 
        ];

        const houses = [];
        for(let i = 1; i <= 27; i++) {
            houses.push({
                id: i,
                px: (Math.random() - 0.5) * 2200,
                py: (Math.random() - 0.5) * 2200,
                v: false
            });
        }

        mImg.onclick = () => {
            if(currentHouseId === 8) {
                mImg.src = "ugly photo8 2.jpg";
                mText.innerText = photoMessages[8];
            }
        };

        function closeM() { 
            modal.style.display = 'none'; mVid.pause(); paused = false; 
            if(houses.every(h => h.v)) document.getElementById('victory-screen').style.display = 'flex';
        }

        const bind = (id, k) => {
            const el = document.getElementById(id);
            el.ontouchstart = (e) => { e.preventDefault(); keys[k] = true; };
            el.onmousedown = () => { keys[k] = true; };
        };
        bind('up','u'); bind('down','d'); bind('left','l'); bind('right','r');
        window.onmouseup = window.ontouchend = () => { keys.u = keys.d = keys.l = keys.r = false; };

        function drawPlayer(cx, cy) {
            const size = 50; 
            if (charImg.complete && charImg.naturalWidth !== 0) {
                ctx.save();
                ctx.beginPath(); ctx.arc(cx, cy, size/2, 0, Math.PI * 2); ctx.clip(); 
                ctx.drawImage(charImg, cx - size/2, cy - size/2, size, size);
                ctx.restore();
                ctx.strokeStyle = "gold"; ctx.lineWidth = 3; ctx.stroke();
            } else {
                ctx.fillStyle = "#FFD700"; ctx.beginPath(); ctx.arc(cx, cy, 22, 0, 7); ctx.fill();
                ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();
            }
        }

        function draw() {
            ctx.fillStyle = state === 'overworld' ? "#4a7c44" : "#2c3e50";
            ctx.fillRect(0, 0, w, h);

            if(!paused) {
                if(keys.u) y += 13; if(keys.d) y -= 13;
                if(keys.l) x += 13; if(keys.r) x -= 13;
            }

            if (state === 'overworld') {
                // Main House
                const hx = w/2 + x, hy = h/2 - 300 + y;
                ctx.fillStyle = "#8b4513"; ctx.fillRect(hx, hy, 150, 150);
                ctx.fillStyle = "#333"; ctx.beginPath(); ctx.moveTo(hx-20, hy); ctx.lineTo(hx+75, hy-80); ctx.lineTo(hx+170, hy); ctx.fill();
                ctx.fillStyle = "yellow"; ctx.fillRect(hx+60, hy+90, 30, 60);
                if(Math.hypot(w/2 - (hx+75), h/2 - (hy+75)) < 80) { state = 'indoor'; x = 0; y = 0; }

                // --- NEW: THE JOKE HUT ---
                const jx = hx + 300, jy = hy + 50;
                ctx.fillStyle = "#27ae60"; ctx.fillRect(jx, jy, 100, 100);
                ctx.fillStyle = "#2ecc71"; ctx.beginPath(); ctx.moveTo(jx-10, jy); ctx.lineTo(jx+50, jy-50); ctx.lineTo(jx+110, jy); ctx.fill();
                ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.fillText("JOKES", jx+22, jy+60);
                
                if(Math.hypot(w/2 - (jx+50), h/2 - (jy+50)) < 60 && !paused) {
                    paused = true;
                    document.getElementById('m-title').innerText = "Dad Joke Dispenser";
                    mImg.style.display = "none"; mVid.style.display = "none";
                    mText.innerText = dadJokes[Math.floor(Math.random() * dadJokes.length)];
                    modal.style.display = 'block';
                }
            } else {
                houses.forEach(hItem => {
                    const sx = w/2 + hItem.px + x, sy = h/2 + hItem.py + y;
                    ctx.fillStyle = hItem.v ? "#555" : (hItem.id === 1 ? "#3498db" : "#e74c3c");
                    ctx.fillRect(sx, sy, 45, 45);
                    ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; 
                    ctx.fillText(hItem.id === 1 ? "VIDEO" : hItem.id, sx + 5, sy + 25);

                    if(Math.hypot(w/2 - (sx+22), h/2 - (sy+22)) < 40 && !hItem.v) {
                        hItem.v = true; paused = true; currentHouseId = hItem.id;
                        document.getElementById('m-title').innerText = hItem.id === 1 ? "Special Video" : "Memory #" + hItem.id;
                        mVid.style.display = "none"; mImg.style.display = "block";
                        let fileNum = (hItem.id <= 8) ? hItem.id : hItem.id + 1;
                        let msgIdx = (hItem.id <= 8) ? hItem.id - 1 : hItem.id;
                        mImg.src = "ugly photo" + fileNum + ".jpg";
                        if(hItem.id === 1) { mImg.style.display = "none"; mVid.style.display = "block"; mVid.src = "ugly photo1.mp4"; }
                        mText.innerText = photoMessages[msgIdx] || "Happy Birthday!";
                        modal.style.display = 'block';
                        document.getElementById('instruction').innerText = "Found: " + houses.filter(h=>h.v).length + " / 27";
                    }
                });
            }
            drawPlayer(w/2, h/2);
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
