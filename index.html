<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dad's 28-Photo Birthday Quest</title>
    <style>
        body { margin: 0; overflow: hidden; background: #4a7c44; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui-top { position: absolute; top: 10px; width: 100%; text-align: center; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; z-index: 10; }
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 20; }
        .side-btns { display: flex; gap: 50px; }
        .ctrl-btn { width: 70px; height: 70px; border-radius: 50%; background: rgba(255, 255, 255, 0.2); color: white; border: 3px solid white; font-size: 30px; display: flex; justify-content: center; align-items: center; user-select: none; -webkit-tap-highlight-color: transparent; }
        .ctrl-btn:active { background: rgba(255, 255, 255, 0.5); }
        #memory-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.6); text-align: center; width: 85%; max-width: 400px; z-index: 100; }
        #image-container { overflow: hidden; border-radius: 10px; margin-bottom: 10px; background: #eee; min-height: 200px; display: flex; align-items: center; justify-content: center; position: relative; }
        #modal-img { width: 100%; transition: transform 0.4s ease; cursor: pointer; display: block; }
        #memory-modal h2 { margin: 10px 0; color: #333; font-size: 1.2rem; }
        #memory-modal button { margin-top: 10px; padding: 12px 25px; background: #4a7c44; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #counter { position: absolute; top: 60px; width: 100%; text-align: center; color: #FFD700; font-weight: bold; z-index: 10; font-size: 18px; }
        #loading-text { position: absolute; color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <div id="ui-top">
        <h1>HAPPY BIRTHDAY DAD!</h1>
        <div id="counter">Photos Found: 0 / 28</div>
    </div>

    <div id="controls">
        <div class="ctrl-btn" id="up">▲</div>
        <div class="side-btns">
            <div class="ctrl-btn" id="left">◀</div>
            <div class="ctrl-btn" id="right">▶</div>
        </div>
        <div class="ctrl-btn" id="down">▼</div>
    </div>

    <div id="memory-modal">
        <h2 id="modal-title"></h2>
        <div id="image-container">
            <div id="loading-text">Loading...</div>
            <img id="modal-img" src="" alt="Birthday Memory">
        </div>
        <p id="modal-text"></p>
        <button onclick="closeModal()">Back to the Map</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const modal = document.getElementById('memory-modal');
        const modalImg = document.getElementById('modal-img');
        const counterDisplay = document.getElementById('counter');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let worldX = 0, worldY = 0, speed = 10, isPaused = false;
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        // GENERATE 28 HOUSES
        const houses = [];
        const colors = ['#8b4513', '#4682b4', '#e63946', '#2a9d8f', '#f4a261', '#9b5de5', '#ff006e'];
        
        for (let i = 1; i <= 28; i++) {
            houses.push({
                x: (Math.random() - 0.5) * 4000, 
                y: (Math.random() - 0.5) * 4000,
                color: colors[i % colors.length],
                label: "Ugly Photo " + i,
                memory: i === 28 ? "THE GRAND FINALE! Click to zoom!" : "Found photo #" + i + "!",
                baseName: "ugly photo" + i,
                visited: false,
                id: i
            });
        }

        // SMART IMAGE LOADER (Checks .jpg then .JPG then .jpeg)
        function tryLoadImage(baseName) {
            const extensions = ['.jpg', '.JPG', '.jpeg', '.png'];
            let currentExt = 0;
            
            modalImg.onerror = function() {
                currentExt++;
                if (currentExt < extensions.length) {
                    this.src = encodeURI(baseName + extensions[currentExt]);
                } else {
                    this.onerror = null;
                    this.src = 'https://via.placeholder.com/300?text=Image+Not+Found';
                }
            };
            
            modalImg.src = encodeURI(baseName + extensions[currentExt]);
        }

        modalImg.addEventListener('click', () => {
            const currentTitle = document.getElementById('modal-title').innerText;
            if (currentTitle === "Ugly Photo 7") {
                tryLoadImage("ugly photo7 2");
                modalImg.style.transform = "scale(2.5)";
            } else if (currentTitle === "Ugly Photo 28") {
                modalImg.style.transform = "scale(2.5)";
            }
        });

        const stopAllMovement = () => { keys.ArrowUp = false; keys.ArrowDown = false; keys.ArrowLeft = false; keys.ArrowRight = false; };
        window.addEventListener('mouseup', stopAllMovement);
        window.addEventListener('touchend', stopAllMovement);

        const setupBtn = (id, keyName) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); if(!isPaused) keys[keyName] = true; });
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); if(!isPaused) keys[keyName] = true; });
        };
        setupBtn('up', 'ArrowUp'); setupBtn('down', 'ArrowDown'); setupBtn('left', 'ArrowLeft'); setupBtn('right', 'ArrowRight');

        function closeModal() {
            modal.style.display = 'none';
            modalImg.style.transform = "scale(1)";
            isPaused = false;
            const foundCount = houses.filter(h => h.visited).length;
            counterDisplay.innerText = "Photos Found: " + foundCount + " / 28";
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!isPaused) {
                if (keys.ArrowUp) worldY += speed;
                if (keys.ArrowDown) worldY -= speed;
                if (keys.ArrowLeft) worldX += speed;
                if (keys.ArrowRight) worldX -= speed;
            }

            houses.forEach(house => {
                const drawX = canvas.width / 2 + house.x + worldX;
                const drawY = canvas.height / 2 + house.y + worldY;

                if (drawX > -100 && drawX < canvas.width + 100 && drawY > -100 && drawY < canvas.height + 100) {
                    ctx.fillStyle = house.visited ? "#555" : house.color;
                    ctx.fillRect(drawX, drawY, 60, 60);
                    ctx.fillStyle = "#333";
                    ctx.beginPath();
                    ctx.moveTo(drawX - 5, drawY); ctx.lineTo(drawX + 30, drawY - 30); ctx.lineTo(drawX + 65, drawY);
                    ctx.fill();
                    ctx.fillStyle = "white";
                    ctx.font = "bold 12px Arial";
                    ctx.textAlign = "center";
                    ctx.fillText(house.id, drawX + 30, drawY + 35);
                }

                const dist = Math.sqrt(Math.pow(canvas.width/2 - (drawX+30), 2) + Math.pow(canvas.height/2 - (drawY+30), 2));
                if (dist < 40 && !house.visited) {
                    isPaused = true;
                    house.visited = true;
                    stopAllMovement();
                    document.getElementById('modal-title').innerText = house.label;
                    document.getElementById('modal-text').innerText = house.memory;
                    tryLoadImage(house.baseName);
                    modal.style.display = 'block';
                }
            });

            ctx.fillStyle = "#FFD700";
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 20, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "black";
            ctx.font = "bold 10px Arial";
            ctx.textAlign = "center";
            ctx.fillText("DAD", canvas.width / 2, canvas.height / 2 + 4);

            requestAnimationFrame(draw);
        }
        draw();
    </
